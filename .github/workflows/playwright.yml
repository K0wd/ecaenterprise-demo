name: Playwright BDD Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      # SauceDemo demo credentials. In a real project these would be repository
      # secrets; wired through env here to demonstrate the secure, no-hardcode pattern.
      BASE_URL: ${{ vars.BASE_URL || 'https://www.saucedemo.com' }}
      STANDARD_USER: ${{ secrets.STANDARD_USER || 'standard_user' }}
      STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD || 'secret_sauce' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run BDD tests
        run: npm test

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
