name: Playwright BDD Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN permissions needed to publish the report to this repo's GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialise runs so the rolling history.json is never updated by two runs at once.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test & build report
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      # SauceDemo demo credentials. In a real project these would be repository
      # secrets; wired through env here to demonstrate the secure, no-hardcode pattern.
      BASE_URL: ${{ vars.BASE_URL || 'https://www.saucedemo.com' }}
      STANDARD_USER: ${{ secrets.STANDARD_USER || 'standard_user' }}
      STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD || 'secret_sauce' }}
      # Where the last published history lives (used to append this run's result).
      PAGES_BASE: https://kimbandeleon.pro/ecaenterprise-demo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Record pass/fail without aborting — we still want to publish a failing run
      # so the history and report reflect reality. The job is failed at the end.
      - name: Run BDD tests
        id: tests
        continue-on-error: true
        run: npm test

      - name: Fetch previously published history
        run: |
          curl -sfL "$PAGES_BASE/history.json" -o prev-history.json \
            || echo "No previous history yet — starting fresh."

      - name: Assemble Pages site (report + history)
        env:
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          # Visual BDD journey is the landing page; full Playwright report (video/trace) under /report/.
          mkdir -p public/report
          cp -r playwright-report/. public/report/
          RUN_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" node scripts/build-history.mjs
          REPORT_META="Run #${{ github.run_number }} · ${{ github.ref_name }} · $(date -u +%Y-%m-%d)" node scripts/build-visual-report.mjs

      - name: Stitch full-journey video
        run: |
          which ffmpeg || (sudo apt-get update && sudo apt-get install -y ffmpeg)
          cd public/evidence
          if [ -s manifest.txt ]; then
            # All clips share codec/size, so a stream copy stitches cleanly; re-encode as fallback.
            ffmpeg -y -f concat -safe 0 -i manifest.txt -c copy full-journey.webm \
              || ffmpeg -y -f concat -safe 0 -i manifest.txt -c:v libvpx -b:v 1M full-journey.webm
            # Keep only the stitched journey in the deploy.
            rm -f journey-*.webm manifest.txt
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Fail the job if tests failed
        if: steps.tests.outcome == 'failure'
        run: |
          echo "::error::Playwright tests failed — see the published report."
          exit 1

  deploy:
    name: Deploy report to Pages
    needs: test
    # Publish even when tests failed, so the report and history stay current.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
